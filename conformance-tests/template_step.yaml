AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Durable Execution Conformance Test Examples - Java (Step)

Parameters:
  Architecture:
    Type: String
    Default: arm64
    Description: Lambda Function Architecture
    AllowedValues:
      - x86_64
      - arm64
  JavaVersion:
    Type: String
    Default: 'java21'
    Description: Java runtime version

Globals:
  Function:
    Timeout: 60
    MemorySize: 512
    Runtime:
      Ref: JavaVersion
    Architectures:
      - Ref: Architecture

Resources:
  DurableFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal:
            Service: lambda.amazonaws.com
          Action: sts:AssumeRole
      ManagedPolicyArns:
      - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
      - PolicyName: DurableExecutionPolicy
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
          - Effect: Allow
            Action:
            - lambda:CheckpointDurableExecution
            - lambda:GetDurableExecutionState
            Resource: '*'

  StepBasic:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription: ["1-1"]
    Properties:
      CodeUri: .
      Handler: step.StepBasic
      Description: Step basic (succeeds on first attempt)
      Role:
        Fn::GetAtt:
        - DurableFunctionRole
        - Arn
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 300

  StepWithName:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription: ["1-2"]
    Properties:
      CodeUri: .
      Handler: step.StepWithName
      Description: Step with explicit name parameter
      Role:
        Fn::GetAtt:
        - DurableFunctionRole
        - Arn
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 300

  StepNested:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription: ["1-3"]
    Properties:
      CodeUri: .
      Handler: step.StepNested
      Description: Sequential steps where second depends on first
      Role:
        Fn::GetAtt:
        - DurableFunctionRole
        - Arn
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 300

  StepComplexObject:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription: ["1-4"]
    Properties:
      CodeUri: .
      Handler: step.StepComplexObject
      Description: Returning complex object with nested structure
      Role:
        Fn::GetAtt:
        - DurableFunctionRole
        - Arn
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 300

  StepNullResult:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription: ["1-5"]
    Properties:
      CodeUri: .
      Handler: step.StepNullResult
      Description: Undefined/null result
      Role:
        Fn::GetAtt:
        - DurableFunctionRole
        - Arn
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 300

  StepCustomSerdes:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription: ["1-6"]
    Properties:
      CodeUri: .
      Handler: step.StepCustomSerdes
      Description: Custom serdes (per-step) transforms to uppercase
      Role:
        Fn::GetAtt:
        - DurableFunctionRole
        - Arn
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 300

  StepLogging:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription: ["1-7"]
    Properties:
      CodeUri: .
      Handler: step.StepLogging
      Description: Step with context logger
      Role:
        Fn::GetAtt:
        - DurableFunctionRole
        - Arn
      Environment:
        Variables:
          # Log4j2's default configuration logs at ERROR, which suppresses the
          # logger.info calls that requirement 1-7 asserts on. Raise it to INFO.
          JAVA_TOOL_OPTIONS: -Dorg.apache.logging.log4j.level=INFO
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 300

  StepAndWaitReplay:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription: ["1-8"]
    Properties:
      CodeUri: .
      Handler: step.StepAndWaitReplay
      Description: Step and wait with replay
      Role:
        Fn::GetAtt:
        - DurableFunctionRole
        - Arn
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 300

  StepReplaySkipsSucceeded:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription: ["1-9"]
    Properties:
      CodeUri: .
      Handler: step.StepReplaySkipsSucceeded
      Description: Replay skips succeeded step
      Role:
        Fn::GetAtt:
        - DurableFunctionRole
        - Arn
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 300

  StepReplayRethrowsFailed:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription: ["1-10"]
    Properties:
      CodeUri: .
      Handler: step.StepReplayRethrowsFailed
      Description: Replay re-throws failed step
      Role:
        Fn::GetAtt:
        - DurableFunctionRole
        - Arn
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 300

  StepWithRetry:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription: ["1-11"]
    Properties:
      CodeUri: .
      Handler: step.StepWithRetry
      Description: Step with retry (fails then succeeds)
      Role:
        Fn::GetAtt:
        - DurableFunctionRole
        - Arn
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 300

  StepRetryExhaustion:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription: ["1-12"]
    Properties:
      CodeUri: .
      Handler: step.StepRetryExhaustion
      Description: Retry exhaustion (max attempts)
      Role:
        Fn::GetAtt:
        - DurableFunctionRole
        - Arn
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 300

  StepDefaultRetry:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription: ["1-13"]
    Properties:
      CodeUri: .
      Handler: step.StepDefaultRetry
      Description: Default retry strategy
      Role:
        Fn::GetAtt:
        - DurableFunctionRole
        - Arn
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 300

  StepRetryCustomConfig:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription: ["1-14"]
    Properties:
      CodeUri: .
      Handler: step.StepRetryCustomConfig
      Description: Retry with custom config (fixed interval and backoff)
      Role:
        Fn::GetAtt:
        - DurableFunctionRole
        - Arn
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 300

  StepRetrySpecificException:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription: ["1-15"]
    Properties:
      CodeUri: .
      Handler: step.StepRetrySpecificException
      Description: Retry specific exception
      Role:
        Fn::GetAtt:
        - DurableFunctionRole
        - Arn
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 300

  StepRetryNonRetryable:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription: ["1-16"]
    Properties:
      CodeUri: .
      Handler: step.StepRetryNonRetryable
      Description: Retry specific exception (non-retryable fails)
      Role:
        Fn::GetAtt:
        - DurableFunctionRole
        - Arn
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 300

  StepAtMostOnceNoRetry:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription: ["1-17"]
    Properties:
      CodeUri: .
      Handler: step.StepAtMostOnceNoRetry
      Description: Step with AtMostOncePerRetry semantics (interrupted, no retry)
      Role:
        Fn::GetAtt:
        - DurableFunctionRole
        - Arn
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 300

  StepAtMostOnceWithRetry:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription: ["1-18"]
    Properties:
      CodeUri: .
      Handler: step.StepAtMostOnceWithRetry
      Description: AtMostOnce interrupted (with retry, succeeds on second attempt)
      Role:
        Fn::GetAtt:
        - DurableFunctionRole
        - Arn
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 300

  StepWithError:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription: ["1-19"]
    Properties:
      CodeUri: .
      Handler: step.StepWithError
      Description: Step with error (fails permanently)
      Role:
        Fn::GetAtt:
        - DurableFunctionRole
        - Arn
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 300

  StepErrorCaught:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription: ["1-20"]
    Properties:
      CodeUri: .
      Handler: step.StepErrorCaught
      Description: Error caught and handled (try/catch)
      Role:
        Fn::GetAtt:
        - DurableFunctionRole
        - Arn
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 300

AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Durable Execution Conformance Test Examples - Java (Map)
Parameters:
  Architecture:
    Type: String
    Default: arm64
    Description: Lambda Function Architecture
    AllowedValues:
    - x86_64
    - arm64
  JavaVersion:
    Type: String
    Default: java21
    Description: Java runtime version
Globals:
  Function:
    Timeout: 60
    MemorySize: 512
    Runtime:
      Ref: JavaVersion
    Architectures:
    - Ref: Architecture
Resources:
  DurableFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal:
            Service: lambda.amazonaws.com
          Action: sts:AssumeRole
      ManagedPolicyArns:
      - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
      - PolicyName: DurableExecutionPolicy
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
          - Effect: Allow
            Action:
            - lambda:CheckpointDurableExecution
            - lambda:GetDurableExecutionState
            Resource: '*'
  MapBasic:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription:
      - 9-1
      NotImplemented:
      - id: 9-4
        reason: 'known divergence: empty-items map emits InvocationCompleted without
          ContextStarted; handler withheld until the SDK behavior is fixed'
      - id: 9-2
        reason: 'items-only form (no name): every Java context.map overload requires
          a name argument'
      - id: 9-6
        reason: 'throw-if-error rethrow: MapResult has no throw-if-error and map exposes
          no per-item futures'
      - id: 9-13
        reason: 'custom item namer: Java MapConfig has no item-namer field'
      - id: 9-14
        reason: 'custom per-item serdes: Java MapConfig has a single serDes (no separate
          item-level serdes distinct from the result serde)'
      - id: 9-19
        reason: 'operation-level serdes: Java MapConfig serDes is a single per-item+result
          serde, not a whole-result-only serde'
      - id: 9-20
        reason: 'operation-level serdes (replay): same, no distinct whole-result operation-level
          serde in Java'
    Properties:
      CodeUri: MapBasic
      Handler: map.MapBasic
      Description: Map basic (one step per item, all succeed)
      Role:
        Fn::GetAtt:
        - DurableFunctionRole
        - Arn
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 300
    Metadata:
      SamResourceId: MapBasic
  MapItemIndex:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription:
      - 9-3
    Properties:
      CodeUri: MapItemIndex
      Handler: map.MapItemIndex
      Description: Map function receives item and index
      Role:
        Fn::GetAtt:
        - DurableFunctionRole
        - Arn
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 300
    Metadata:
      SamResourceId: MapItemIndex
  MapFailFast:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription:
      - 9-5
    Properties:
      CodeUri: MapFailFast
      Handler: map.MapFailFast
      Description: Map fail-fast (tolerated-failure-count=0) stops after first failure
      Role:
        Fn::GetAtt:
        - DurableFunctionRole
        - Arn
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 300
    Metadata:
      SamResourceId: MapFailFast
  MapMinSuccessful:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription:
      - 9-7
    Properties:
      CodeUri: MapMinSuccessful
      Handler: map.MapMinSuccessful
      Description: Map min-successful early completion
      Role:
        Fn::GetAtt:
        - DurableFunctionRole
        - Arn
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 300
    Metadata:
      SamResourceId: MapMinSuccessful
  MapToleratedWithin:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription:
      - 9-8
    Properties:
      CodeUri: MapToleratedWithin
      Handler: map.MapToleratedWithin
      Description: Map tolerated-failure-count within tolerance (all items complete)
      Role:
        Fn::GetAtt:
        - DurableFunctionRole
        - Arn
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 300
    Metadata:
      SamResourceId: MapToleratedWithin
  MapToleratedExceeded:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription:
      - 9-9
    Properties:
      CodeUri: MapToleratedExceeded
      Handler: map.MapToleratedExceeded
      Description: Map tolerated-failure-count exceeded (stops early)
      Role:
        Fn::GetAtt:
        - DurableFunctionRole
        - Arn
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 300
    Metadata:
      SamResourceId: MapToleratedExceeded
  MapToleratedPct:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription:
      - 9-10
    Properties:
      CodeUri: MapToleratedPct
      Handler: map.MapToleratedPct
      Description: Map tolerated-failure-percentage exceeded (stops early)
      Role:
        Fn::GetAtt:
        - DurableFunctionRole
        - Arn
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 300
    Metadata:
      SamResourceId: MapToleratedPct
  MapConcurrent:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription:
      - 9-11
    Properties:
      CodeUri: MapConcurrent
      Handler: map.MapConcurrent
      Description: Map real concurrency preserves index-ordered results
      Role:
        Fn::GetAtt:
        - DurableFunctionRole
        - Arn
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 300
    Metadata:
      SamResourceId: MapConcurrent
  MapFlat:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription:
      - 9-12
    Properties:
      CodeUri: MapFlat
      Handler: map.MapFlat
      Description: Map with FLAT nesting (virtual iteration contexts)
      Role:
        Fn::GetAtt:
        - DurableFunctionRole
        - Arn
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 300
    Metadata:
      SamResourceId: MapFlat
  MapSuspendIteration:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription:
      - 9-15
    Properties:
      CodeUri: MapSuspendIteration
      Handler: map.MapSuspendIteration
      Description: Map suspends inside an iteration; replay skips the completed iteration
      Role:
        Fn::GetAtt:
        - DurableFunctionRole
        - Arn
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 300
    Metadata:
      SamResourceId: MapSuspendIteration
  MapLargeResult:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription:
      - 9-16
    Properties:
      CodeUri: MapLargeResult
      Handler: map.MapLargeResult
      Description: Map with a large aggregate result (exceeds checkpoint size threshold)
      Role:
        Fn::GetAtt:
        - DurableFunctionRole
        - Arn
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 300
    Metadata:
      SamResourceId: MapLargeResult
  MapThenWait:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription:
      - 9-17
    Properties:
      CodeUri: MapThenWait
      Handler: map.MapThenWait
      Description: Suspension after a successful map (replay skips the completed map)
      Role:
        Fn::GetAtt:
        - DurableFunctionRole
        - Arn
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 300
    Metadata:
      SamResourceId: MapThenWait
  MapFailThenWait:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription:
      - 9-18
    Properties:
      CodeUri: MapFailThenWait
      Handler: map.MapFailThenWait
      Description: Suspension after a map that completed with a failure
      Role:
        Fn::GetAtt:
        - DurableFunctionRole
        - Arn
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 300
    Metadata:
      SamResourceId: MapFailThenWait

name: E2E Tests

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - '.github/**' # for testing Github Actions
      - 'sdk/**'
      - 'sdk-testing/**'
      - 'sdk-integration-tests/**'
      - 'examples/**'
      - 'pom.xml'
  push:
    branches:
      - main
    paths:
      - '.github/**'
      - 'sdk/**'
      - 'sdk-testing/**'
      - 'sdk-integration-tests/**'
      - 'examples/**'
      - 'pom.xml'

concurrency:
  group: e2e-tests
  cancel-in-progress: false

# permission can be added at job level or workflow level
permissions:
  id-token: write # This is required for requesting the JWT
  contents: read # This is required for actions/checkout

jobs:
  e2e-tests:
    env:
      AWS_REGION: us-west-2
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java:
          - 17
          - 21
          - 25
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Setup AWS SAM CLI
        uses: aws-actions/setup-sam@v3
        with:
          use-installer: true
#          token: ${{ secrets.GITHUB_TOKEN }} # only enable if we run into throughput issues
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6.2.1
        with:
          role-to-assume: "${{ secrets.TEST_ROLE_ARN }}"
          role-session-name: java-language-sdk-test
          aws-region: ${{ env.AWS_REGION }}
          allowed-account-ids: ${{ secrets.TEST_ACCOUNT_ID }}
      - name: Setup Java ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          distribution: corretto
          java-version: ${{ matrix.java }}
          cache: maven
      - name: Build locally
        run: mvn -B -q -Dmaven.test.skip=true install --file pom.xml
      - name: sam build
        run: | # add --no-cached  if debugging sam build
          sam build --debug --parameter-overrides \
            'ParameterKey=Architecture,ParameterValue=x86_64 ParameterKey=JavaVersion,ParameterValue=java${{ matrix.java }} ParameterKey=FunctionNamePrefix,ParameterValue=Java${{ matrix.java }}- ParameterKey=RoleArn,ParameterValue=${{ secrets.TEST_LAMBDA_EXECUTION_ROLE_ARN }}'
        working-directory: ./examples
      - name: sam deploy
        run: | 
          sam deploy --stack-name Java${{ matrix.java }}-JavaSDKCloudBasedIntegrationTestStack \
            --resolve-image-repos --resolve-s3 --parameter-overrides \
            'ParameterKey=Architecture,ParameterValue=x86_64 ParameterKey=JavaVersion,ParameterValue=java${{ matrix.java }} ParameterKey=FunctionNamePrefix,ParameterValue=Java${{ matrix.java }}- ParameterKey=RoleArn,ParameterValue=${{ secrets.TEST_LAMBDA_EXECUTION_ROLE_ARN }}'
        working-directory: ./examples
      - name: Cloud Based Integration Tests
        run: mvn clean test -B -Dtest.cloud.enabled=true -Dtest.aws.account='${{ secrets.TEST_ACCOUNT_ID }}' -Dtest="CloudBasedIntegrationTest,OtelXRayIntegrationTest" -Dtest.function.name.prefix='Java${{ matrix.java }}-'
        working-directory: ./examples
      - name: Publish test case summary
        if: always()
        env:
          JAVA_VERSION: ${{ matrix.java }}
        run: |
          python - <<'PY'
          import os
          import xml.etree.ElementTree as ET
          from pathlib import Path

          def markdown(value):
              return str(value).replace("|", "\\|").replace("\n", " ")

          reports = sorted(Path("target/surefire-reports").glob("TEST-*.xml"))
          summary_path = Path(os.environ["GITHUB_STEP_SUMMARY"])

          with summary_path.open("a", encoding="utf-8") as summary:
              summary.write(f"### Java {os.environ['JAVA_VERSION']} E2E Test Cases\n\n")

              if not reports:
                  summary.write("No Surefire XML test reports were found.\n\n")
                  raise SystemExit(0)

              total_tests = 0
              total_failures = 0
              total_errors = 0
              total_skipped = 0
              total_time = 0.0
              cases = []

              for report in reports:
                  suite = ET.parse(report).getroot()
                  total_tests += int(suite.attrib.get("tests", 0))
                  total_failures += int(suite.attrib.get("failures", 0))
                  total_errors += int(suite.attrib.get("errors", 0))
                  total_skipped += int(suite.attrib.get("skipped", 0))
                  total_time += float(suite.attrib.get("time", 0))

                  for case in suite.findall("testcase"):
                      status = "Passed"
                      if case.find("failure") is not None:
                          status = "Failed"
                      elif case.find("error") is not None:
                          status = "Errored"
                      elif case.find("skipped") is not None:
                          status = "Skipped"

                      cases.append((
                          status,
                          case.attrib.get("classname", suite.attrib.get("name", "")),
                          case.attrib.get("name", ""),
                          float(case.attrib.get("time", 0)),
                      ))

              passed = total_tests - total_failures - total_errors - total_skipped
              summary.write(
                  f"**Totals:** {total_tests} tests, {passed} passed, {total_failures} failed, "
                  f"{total_errors} errored, {total_skipped} skipped, {total_time:.2f}s\n\n"
              )
              summary.write("| Status | Class | Test case | Time |\n")
              summary.write("| --- | --- | --- | ---: |\n")

              for status, class_name, test_name, case_time in sorted(cases):
                  summary.write(
                      f"| {status} | `{markdown(class_name)}` | `{markdown(test_name)}` | {case_time:.2f}s |\n"
                  )

              summary.write("\n")
          PY
        working-directory: ./examples
